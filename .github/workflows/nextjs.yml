# Dépendances et build uniquement dans site/ (pas de npm workspaces à la racine :
# sinon les binaires optionnels lightningcss / sharp ne s’installent pas correctement sur Linux CI).
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          generator_config_file: site/next.config.ts

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: site/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('site/package-lock.json') }}-${{ hashFiles('site/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('site/package-lock.json') }}-

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build with Next.js
        working-directory: site
        run: npx next build --webpack

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
